[platformio]
default_envs = cardputer-adv

[env:cardputer-adv]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_speed = 1500000
board_build.filesystem = littlefs
lib_deps =
  m5stack/M5Unified
  m5stack/M5Cardputer
  bblanchon/ArduinoJson@^7.0.0
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=0
  -DCARDPUTER_ADV
  -DBOARD_HAS_PSRAM
  -DCODEX_BUDDY_FIRMWARE=1
